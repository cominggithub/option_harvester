<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      body { font: 13px system-ui, sans-serif; width: 280px; margin: 0; padding: 12px; }
      label { display: block; font-size: 11px; color: #666; margin: 8px 0 2px; }
      input { width: 100%; box-sizing: border-box; padding: 5px; }
      button { width: 100%; padding: 7px; margin-top: 8px; cursor: pointer; }
      .row { display: flex; gap: 6px; }
      .row button { margin-top: 0; }
      #log { white-space: pre-wrap; font-size: 11px; color: #333; margin-top: 10px;
             max-height: 160px; overflow: auto; background: #f5f5f5; padding: 6px; }
      h4 { margin: 10px 0 0; }
    </style>
  </head>
  <body>
    <label>Backend URL</label>
    <input id="backend" placeholder="http://114.33.62.221:19211" />

    <h4>1. Recon (co-dev)</h4>
    <label>Open the Positions / Orders / Trades page, then send what it loaded:</label>
    <div class="row">
      <button id="send-pos">Send (positions)</button>
      <button id="send-ord">Send (orders)</button>
    </div>
    <button id="send-trd">Send (trades)</button>

    <h4>2. Sync</h4>
    <button id="sync">Sync now → DB</button>

    <div class="row" style="margin-top: 8px">
      <button id="list">List captured</button>
      <button id="clear">Clear capture</button>
    </div>

    <div id="log"></div>
    <script src="popup.js"></script>
  </body>
</html>
