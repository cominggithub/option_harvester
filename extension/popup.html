<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      body { font: 13px system-ui, sans-serif; width: 280px; margin: 0; padding: 12px; }
      label { display: block; font-size: 11px; color: #666; margin: 8px 0 2px; }
      input[type="text"] { width: 100%; box-sizing: border-box; padding: 5px; }
      button { width: 100%; padding: 8px; margin-top: 10px; cursor: pointer; font-weight: 600; }
      .auto { display: flex; align-items: center; gap: 6px; margin-top: 12px; font-size: 12px; }
      .auto input[type="number"] { width: 48px; }
      #log { white-space: pre-wrap; font-size: 11px; color: #333; margin-top: 10px;
             background: #f5f5f5; padding: 6px; border-radius: 4px; min-height: 16px; }
    </style>
  </head>
  <body>
    <label>Backend URL</label>
    <input type="text" id="backend" placeholder="http://114.33.62.221:19210" />

    <button id="sync">Sync now</button>

    <div class="auto">
      <input type="checkbox" id="auto" />
      <label for="auto" style="margin: 0">Auto-sync every</label>
      <input type="number" id="mins" min="1" value="15" /> min
    </div>

    <div id="log">Log in to IB, then Sync (or turn on auto-sync).</div>

    <button id="capture" style="margin-top: 14px; font-weight: 400; font-size: 11px; background: #f0f0f0;">
      Send page (dev) →
    </button>
    <input type="text" id="label" placeholder="label e.g. chain-AAPL" style="margin-top: 4px; font-size: 11px;" />
    <script src="popup.js"></script>
  </body>
</html>
